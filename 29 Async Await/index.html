<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Explorer | Find GitHub Users</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- ================= NAVBAR ================= -->

    <nav class="navbar navbar-expand-lg navbar-dark shadow-lg">
      <div class="container">
        <a class="navbar-brand fw-bold fs-3" href="#">
          <i class="bi bi-github me-2"></i>
          GitHub Explorer
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbar"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbar">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="#"> Home </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="https://github.com" target="_blank">
                GitHub
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- ================= HERO ================= -->

    <section class="hero">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-8 text-center">
            <h1 class="display-4 fw-bold">Explore GitHub Users</h1>

            <p class="lead text-light mt-3">
              Search any GitHub developer and explore their public profile using
              the GitHub REST API.
            </p>
          </div>
        </div>
      </div>
    </section>

    <!-- ================= SEARCH ================= -->

    <section class="search-section">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-8">
            <div class="search-box shadow">
              <input
                type="text"
                id="searchInput"
                class="form-control form-control-lg"
                placeholder="Search GitHub Username..."
              />

              <button class="btn btn-primary btn-lg" id="searchBtn">
                <i class="bi bi-search"></i>
                Search
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ================= LOADER ================= -->

    <div id="loader" class="text-center my-5 d-none">
      <div
        class="spinner-border text-light"
        style="width: 4rem; height: 4rem"
        role="status"
      >
        <span class="visually-hidden"> Loading... </span>
      </div>

      <h5 class="mt-3 text-white">Fetching GitHub Users...</h5>
    </div>

    <!-- ================= ERROR ================= -->

    <div class="container">
      <div id="error" class="alert alert-danger text-center d-none"></div>
    </div>

    <!-- ================= USER CARDS ================= -->

    <section class="py-5">
      <div class="container">
        <div id="userContainer" class="row g-4 justify-content-center"></div>
      </div>
    </section>

    <!-- ================= FOOTER ================= -->

    <footer class="py-4 mt-5">
      <div class="container text-center">
        <p class="mb-0">
          Made with ❤️ using
          <span class="fw-bold">
            HTML • CSS • Bootstrap • JavaScript • GitHub API
          </span>
        </p>
      </div>
    </footer>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->

    <script src="script.js"></script>
  </body>
</html>
