<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Astrology App</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="card astrology-card shadow-lg p-4">
        <h2 class="text-center mb-4">🔮 Astrology Insights</h2>

        <form id="astroForm">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">First Name</label>
              <input type="text" id="name" class="form-control" required />
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Surname</label>
              <input type="text" id="surname" class="form-control" required />
            </div>
          </div>

          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label">Day</label>
              <input
                type="number"
                id="day"
                class="form-control"
                min="1"
                max="31"
                required
              />
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label">Month</label>
              <input
                type="number"
                id="month"
                class="form-control"
                min="1"
                max="12"
                required
              />
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label">Year</label>
              <input
                type="number"
                id="year"
                class="form-control"
                min="1900"
                max="2025"
                required
              />
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            ✨ Get Insights
          </button>
        </form>

        <div id="result" class="result-box mt-4"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
