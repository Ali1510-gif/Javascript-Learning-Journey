
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Background Color Changer</title>

    <!-- Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
      <div class="card text-center p-4 shadow-lg color-card">
        <h2 class="mb-3">🎨 Background Color Changer</h2>
        <p class="mb-4">Click a color to change background</p>

        <div id="parent" class="d-flex flex-wrap justify-content-center gap-3">
          <button
            class="color-btn"
            data-color="red"
            style="background: red"
          ></button>
          <button
            class="color-btn"
            data-color="blue"
            style="background: blue"
          ></button>
          <button
            class="color-btn"
            data-color="orange"
            style="background: orange"
          ></button>
          <button
            class="color-btn"
            data-color="pink"
            style="background: pink"
          ></button>
          <button
            class="color-btn"
            data-color="green"
            style="background: green"
          ></button>
          <button
            class="color-btn"
            data-color="purple"
            style="background: purple"
          ></button>
          <button
            class="color-btn"
            data-color="black"
            style="background: black"
          ></button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
