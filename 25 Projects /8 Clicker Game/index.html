<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clicker Game</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container text-center py-4">
      <h1 class="mb-4">🎮 Clicker Game</h1>

      <div class="d-flex justify-content-center gap-4 mb-3">
        <h5>Score: <span id="score">0</span></h5>
        <h5>Time: <span id="time">30</span>s</h5>
      </div>

      <button id="startBtn" class="btn btn-success mb-3">Start Game</button>
      <button id="restartBtn" class="btn btn-warning mb-3 d-none">
        Restart
      </button>

      <div id="gameArea" class="game-area">
        <p class="text-muted">Click anywhere to score points!</p>
      </div>

      <h4 id="finalScore" class="mt-3"></h4>
    </div>

    <script src="script.js"></script>
  </body>
</html>
