<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Clock</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="bg-gradient-to-br from-black via-gray-900 to-gray-800 flex items-center justify-center h-screen text-white"
  >
    <div class="text-center">
      <h1 class="text-3xl mb-4 font-semibold tracking-wide">
        ⏰ Digital Clock
      </h1>

      <div
        id="time"
        class="text-6xl md:text-7xl font-bold bg-white/10 backdrop-blur-lg px-10 py-6 rounded-2xl shadow-lg"
      ></div>

      <p id="date" class="mt-4 text-gray-300"></p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
