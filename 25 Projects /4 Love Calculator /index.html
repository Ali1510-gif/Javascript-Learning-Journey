<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love Calculator ❤️</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
      <div class="card love-card text-center p-4 shadow-lg">
        <h2 class="mb-3">❤️ Love Calculator</h2>
        <p class="text-muted">Find your compatibility</p>

        <form id="loveForm">
          <input
            type="text"
            id="Boy"
            class="form-control mb-3"
            placeholder="Enter Boy Name"
            required
          />

          <input
            type="text"
            id="Girl"
            class="form-control mb-3"
            placeholder="Enter Girl Name"
            required
          />

          <button type="submit" class="btn btn-danger w-100">
            Calculate ❤️
          </button>
        </form>

        <div class="result-box mt-4">
          <h3 id="resultText">Result: --%</h3>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
