<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Quote Generator</title>

    <!-- Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
      <div class="card quote-card text-center p-4 shadow-lg">
        <h2 class="mb-3">💡 Random Quote Generator</h2>

        <p id="quote" class="quote-text">Honesty is the best policy.</p>

        <div class="mt-4 d-flex justify-content-center gap-2 flex-wrap">
          <button id="generateBtn" class="btn btn-primary">New Quote</button>

          <button id="copyBtn" class="btn btn-outline-light">Copy</button>

          <button id="tweetBtn" class="btn btn-info text-dark">Tweet</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
